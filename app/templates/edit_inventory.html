{% extends 'base.html' %}

{% block title %}Edit Item{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">Edit Item</h4>
    <a href="{{ url_for('inventory') }}" class="btn-outline-secondary btn-sm">Kembali?</a>
</div>

<div class="card border-secondary">
    <div class="card-body">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Kode Barang</label>
                    <input type="text" name="kode_barang" class="form-control" value="{{ item.kode_barang }} " required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Nama Barang</label>
                    <input type="text" name="nama_barang" class="form-control" value=" {{ item.nama_barang }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Kategori</label>
                    <input type="text" name="kategori" class="form-control" value="{{ item.kategori or '' }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Satuan Storage</label>
                    <select name="satuan" class="form-control">
                    <option value="gram"
                        {% if item.satuan == 'gram' %}
                            selected
                        {% endif %}>
                            gram
                    </option>
                    <option value="ml"
                        {% if item.satuan == 'ml' %}
                            selected
                        {% endif %}>
                            ml
                    </option>
                    <option value="pcs"
                        {% if item.satuan == 'pcs' %}
                            selected
                        {% endif %}>
                            pcs
                    </option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">QTY</label>
                    <input type="number" name="qty" class="form-control" step="0.01" min="0" value="{{ item.qty }}" required>
                </div>
                <div class="col-md-4">
                <label class="form-label">
                    Input Unit
                </label>
                <select name="display_unit" class="form-control">
                <option value="kg">kg</option>
                <option value="gram">gram</option>
                <option value="liter">liter</option>
                <option value="ml">ml</option>
                <option value="pcs">pcs</option>
                </select>
                </div>
                <div class="col-12">
                    <label class="form-label">Keterangan</label>
                    <textarea name="keterangan" class="form-control" rows="2">{{ item.keterangan or '' }}</textarea>
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary">Update</button>
                <a href="{{ url_for('inventory') }}" class="btn btn-outline-secondary ms-2">Batal</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
