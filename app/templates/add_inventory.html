{% extends 'base.html' %}

{% block title %}Tambah Item{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">Tambah Item</h4>
    <a href="{{ url_for('inventory') }}" class="btn btn-outline-secondary btn-sm">Kembali?</a>
</div>

<div class="card border-secondary">
    <div class="card-body">
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Kode Barang</label>
                    <input type="text" name="kode_barang" class="form control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Nama Barang</label>
                    <input type="text" name="nama_barang" class="form control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Kategori</label>
                    <input type="text" name="kategori" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Satuan</label>
                    <input type="text" name="satuan" class="form-control" placeholder="ex: kg, liter, botol">
                </div>
                <div class="col-md-4">
                    <label class="form-label">QTY</label>
                    <input type="number" name="qty" class="form-control" step="0.01" value="0" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Harga Beli</label>
                    <input type="number" name="harga_beli" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Harga Jual</label>
                    <input type="number" name="harga_jual" class="form-control">
                </div>
                <div class="col-12">
                    <label class="form-label">Keterangan</label>
                    <textarea name="keterangan" class="form-control" rows="2"></textarea>
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary">Simpan</button>
                <a href="{{ url_for('inventory') }}" class="btn btn-outline-secondary ms-2">Batal</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
